types {
  application/wasm wasm;
  application/javascript js mjs;
  text/css css;
  text/html html;
}

server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # The app ships as a small ES module graph that changes frequently.
  # If Firefox keeps an older imported module while app.js is newer, the
  # page can fail to link with "Loading failed for the module". Revalidate
  # HTML/CSS/JS on every load so the graph stays coherent after deploys.
  add_header Cache-Control "no-cache, must-revalidate" always;

  # The WASM binary is stable and expensive to re-download; it can stay hot.
  location ~* \.wasm$ {
    add_header Cache-Control "public, max-age=604800, immutable" always;
  }

  # SPA-ish: missing files fall through to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
